# Scan & Save — Production Apache VirtualHost Config
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   cp apache-vhost.conf /etc/apache2/sites-available/scanapp.conf
#   a2enmod rewrite headers deflate ssl
#   a2ensite scanapp
#   certbot --apache -d yourdomain.com
#   apachectl graceful
#
# Assumes:
#   - Frontend build at /var/www/html/scanapp/
#   - Backend PHP at /var/www/html/scanapp/api/
#   - PHP 8.4 module (libapache2-mod-php8.4)
#   - Let's Encrypt cert via certbot
# ─────────────────────────────────────────────────────────────────────────────

# HTTP → HTTPS
<VirtualHost *:80>
    ServerName yourdomain.com
    ServerAlias www.yourdomain.com
    Redirect permanent / https://yourdomain.com/
</VirtualHost>

<VirtualHost *:443>
    ServerName yourdomain.com
    DocumentRoot /var/www/html

    # TLS (certbot fills these in automatically)
    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/yourdomain.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/yourdomain.com/privkey.pem

    # ── Security headers ───────────────────────────────────────────────────────
    <IfModule mod_headers.c>
        Header always set X-Content-Type-Options    "nosniff"
        Header always set X-Frame-Options           "DENY"
        Header always set X-XSS-Protection          "1; mode=block"
        Header always set Referrer-Policy           "strict-origin-when-cross-origin"
        Header always set Permissions-Policy        "camera=self, notifications=self, microphone=()"
        Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    </IfModule>

    # ── Gzip ──────────────────────────────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/css application/javascript
        AddOutputFilterByType DEFLATE application/json image/svg+xml font/woff2
        AddOutputFilterByType DEFLATE application/manifest+json
    </IfModule>

    # ── Frontend ──────────────────────────────────────────────────────────────
    <Directory /var/www/html/scanapp>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Backend API ───────────────────────────────────────────────────────────
    <Directory /var/www/html/scanapp/api>
        Options -Indexes
        AllowOverride All
        Require all granted

        # Pass Authorization header (Apache strips it by default)
        RewriteEngine On
        RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]
    </Directory>

    # Auth rate limiting (requires mod_ratelimit or mod_evasive)
    # If using mod_evasive:
    # <IfModule mod_evasive24.c>
    #     DOSHashTableSize    3097
    #     DOSPageCount        5
    #     DOSSiteCount        50
    #     DOSPageInterval     1
    #     DOSSiteInterval     1
    #     DOSBlockingPeriod   600
    # </IfModule>

    ErrorLog  /var/log/apache2/scanapp-error.log
    CustomLog /var/log/apache2/scanapp-access.log combined
</VirtualHost>
