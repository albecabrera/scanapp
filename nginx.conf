# Scan & Save — Production Nginx Config
# ─────────────────────────────────────────────────────────────────────────────
# Usage:
#   cp nginx.conf /etc/nginx/sites-available/scanapp
#   ln -s /etc/nginx/sites-available/scanapp /etc/nginx/sites-enabled/scanapp
#   nginx -t && systemctl reload nginx
#
# Assumes:
#   - App served at https://yourdomain.com/scanapp/
#   - Frontend build at /var/www/html/scanapp/
#   - Backend PHP at /var/www/html/scanapp/api/
#   - PHP-FPM listening on unix socket (adjust if using TCP)
#   - Let's Encrypt cert via certbot
#
# For root-domain deployment: replace location /scanapp/ with location /
# ─────────────────────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://yourdomain.com$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com;

    # TLS (managed by certbot — run: certbot --nginx -d yourdomain.com)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html;
    index index.html index.php;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                        always;
    add_header X-Frame-Options           "DENY"                           always;
    add_header X-XSS-Protection          "1; mode=block"                  always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=self, notifications=self, microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/html text/css application/javascript application/json
               image/svg+xml font/woff2 application/manifest+json;

    # ── API backend (PHP-FPM) ─────────────────────────────────────────────────
    location /scanapp/api/ {
        # Auth endpoints: strict rate limit (5 req/min per IP)
        location ~ ^/scanapp/api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;
            limit_req_status 429;
            fastcgi_pass unix:/run/php/php8.4-fpm.sock;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/html/scanapp/api/index.php;
            fastcgi_param QUERY_STRING    path=$1;

            # Let .htaccess pass the Authorization header
            fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        }

        # General API
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        rewrite ^/scanapp/api/v1/(.*)$ /scanapp/api/index.php?path=$1 last;
    }

    location ~ ^/scanapp/api/index\.php$ {
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/scanapp/api/index.php;
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    }

    # ── Frontend static assets ─────────────────────────────────────────────────
    location /scanapp/ {
        alias /var/www/html/scanapp/;

        # Hashed JS/CSS — immutable cache (Vite content-hashes filenames)
        location ~* /scanapp/assets/.*\.(js|css|woff2?)$ {
            alias /var/www/html/scanapp/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        # Service Worker — never cache
        location = /scanapp/sw.js {
            alias /var/www/html/scanapp/sw.js;
            add_header Cache-Control "no-store";
            add_header Service-Worker-Allowed "/";
        }

        # Manifest — short cache
        location = /scanapp/manifest.json {
            alias /var/www/html/scanapp/manifest.json;
            add_header Cache-Control "no-cache";
            add_header Content-Type "application/manifest+json";
        }

        # Icons — moderate cache
        location ~* /scanapp/icons/.*\.png$ {
            alias /var/www/html/scanapp/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # SPA fallback — not needed (app uses tab-based routing, no URL changes)
        # If you add URL routing later: try_files $uri /scanapp/index.html;
        try_files $uri $uri/ =404;
    }

    # ── Health check (no rate limit, no auth) ─────────────────────────────────
    location = /scanapp/api/v1/health {
        access_log off;
        rewrite ^ /scanapp/api/index.php?path=health last;
    }
}
